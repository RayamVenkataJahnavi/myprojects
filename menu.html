<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
   
</head>
<body>

    <div class="container bg-success py-2">
        <div >
            <label for="category" style="color: white;"">Select Category:</label>
            <select id="category" onchange="filterMenu()" style="background-color:skyblue">
                <option value="all">All</option>
                <option value="Starters">Starters</option>
                <option value="Main Course">Main Course</option>
                <option value="Desserts">Desserts</option>
                <option value="Beverages">Beverages</option>
            </select>
        </div>
    </div>
        <table id="menuTable" class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Cuisine</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <!-- Menu items will be dynamically populated here -->
            </tbody>
        </table>
    </div>   
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="menu.js"></script>
</body>
</html>
