<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="orderFormContent">
        <form id="dynamicOrderForm" onsubmit="placeOrder()">
            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" class="form-control" id="customerName" required>
            </div>
            <div class="form-group">
                <label for="customerPhone">Phone Number</label>
                <input type="text" class="form-control" id="customerPhone" required>
            </div>
            <div class="form-group">
                <label for="customerEmail">Email</label>
                <input type="email" class="form-control" id="customerEmail" required>
            </div>
            <div class="form-group">
                <label for="customerAddress">Address</label>
                <input type="text" class="form-control" id="customerAddress" required>
            </div>
            <div class="form-group">
                <label for="orderDate">Order Date</label>
                <input type="date" class="form-control" id="orderDate" required>
            </div>
            <div class="form-group">
                <label for="orderItems">Order Items</label>
                <div id="orderItemsContainer"></div>
                <button type="button" id="addItemButton" class="btn btn-secondary" onclick="addOrderItem()">+ Add Item</button>
            </div>
            <div class="form-group">
                <label for="totalAmount">Total Amount (INR)</label>
                <input type="number" class="form-control" id="totalAmount" readonly>
            </div>
            <button type="submit" class="btn btn-primary" style="background-color:gold; color: black;">Order Now</button>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="order.js"></script>
</body>
</html>
